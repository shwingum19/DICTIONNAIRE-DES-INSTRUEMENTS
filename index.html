<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encyclopédie Musicale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0b;
    --surface: #171613;
    --card: #1e1c18;
    --accent: #c8a96e;
    --accent2: #8fb89c;
    --text: #ede8df;
    --muted: #7a7468;
    --border: rgba(200,169,110,0.18);
    --danger: #c45c4a;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 5px;
    font-style: italic;
  }
  .header-count {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    padding-bottom: 4px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 36px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .add-btn {
    background: var(--accent);
    border: none;
    color: #1a1712;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: opacity 0.2s;
    margin-left: auto;
  }
  .add-btn:hover { opacity: 0.85; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .card {
    background: var(--bg);
    padding: 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .card:hover { background: var(--card); }
  .card-family {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-origin {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    font-style: italic;
  }
  .card-desc {
    font-size: 13px;
    color: #a09890;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .audio-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(143,184,156,0.12);
    border: 1px solid rgba(143,184,156,0.25);
    color: var(--accent2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
  }
  .no-audio { font-size: 11px; color: var(--muted); }
  .card-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

  .empty-state {
    grid-column: 1/-1;
    padding: 5rem;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .big {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 10px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    position: relative;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 1.5rem;
    font-style: italic;
  }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--muted); opacity: 0.7; }
  .form-group select option { background: var(--card); color: var(--text); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .audio-drop {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .audio-drop:hover, .audio-drop.drag { border-color: var(--accent); }
  .audio-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .audio-drop .drop-text { font-size: 13px; color: var(--muted); }
  .audio-drop .drop-hint { font-size: 11px; color: var(--muted); margin-top: 4px; opacity: 0.6; }
  .audio-drop .file-name { font-size: 13px; color: var(--accent2); margin-top: 6px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  .btn-save {
    background: var(--accent);
    border: none;
    color: #1a1712;
    padding: 9px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* DETAIL PANEL */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.6);
    z-index: 99;
    justify-content: flex-end;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: var(--card);
    border-left: 1px solid var(--border);
    width: 100%;
    max-width: 420px;
    height: 100%;
    overflow-y: auto;
    padding: 2.5rem 2rem;
    animation: slideIn 0.22s ease;
    position: relative;
  }
  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  .detail-close {
    position: absolute;
    top: 1.2rem; right: 1.2rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { border-color: var(--muted); color: var(--text); }
  .detail-family {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .detail-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.1rem;
    font-weight: 400;
    margin-bottom: 4px;
    line-height: 1.15;
  }
  .detail-origin {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 1.8rem;
  }
  .detail-section { margin-bottom: 1.6rem; }
  .detail-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .detail-text {
    font-size: 14px;
    color: #c8c0b4;
    line-height: 1.75;
  }

  /* AUDIO PLAYER */
  .audio-player {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem;
  }
  .player-track {
    font-size: 12px;
    color: var(--accent2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    word-break: break-all;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .play-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #1a1712;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .play-btn:hover { opacity: 0.85; }
  .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .progress-bar-bg {
    height: 4px;
    background: rgba(200,169,110,0.2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }
  .time-display {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--accent);
    margin-right: 6px;
    margin-bottom: 5px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(200,169,110,0.4); }

  @media (max-width: 600px) {
    .header { flex-direction: column; align-items: flex-start; }
    .toolbar { gap: 8px; }
    .form-row { grid-template-columns: 1fr; }
    .detail-panel { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">♩ Encyclopédie Musicale</div>
    <div class="header-sub">Dictionnaire interactif des instruments du monde</div>
  </div>
  <div class="header-count" id="count">0 instrument</div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Rechercher un instrument…" oninput="render()">
  </div>
  <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('Cordes', this)">Cordes</button>
  <button class="filter-btn" onclick="setFilter('Vents', this)">Vents</button>
  <button class="filter-btn" onclick="setFilter('Percussions', this)">Percussions</button>
  <button class="filter-btn" onclick="setFilter('Clavier', this)">Clavier</button>
  <button class="filter-btn" onclick="setFilter('Électronique', this)">Électro</button>
  <button class="add-btn" onclick="openAdd()">+ Ajouter</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL AJOUT / ÉDITION -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouvel instrument</div>
    <div class="form-row">
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" id="f-name" placeholder="ex : Violoncelle">
      </div>
      <div class="form-group">
        <label>Famille *</label>
        <select id="f-family">
          <option>Cordes</option>
          <option>Vents</option>
          <option>Percussions</option>
          <option>Clavier</option>
          <option>Électronique</option>
          <option>Autre</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Origine géographique</label>
        <input type="text" id="f-origin" placeholder="ex : Europe, XIVe s.">
      </div>
      <div class="form-group">
        <label>Tags (séparés par virgules)</label>
        <input type="text" id="f-tags" placeholder="ex : classique, orchestre">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" rows="4" placeholder="Décrivez l'instrument, son histoire, son mode de jeu…"></textarea>
    </div>
    <div class="form-group">
      <label>Fichier audio</label>
      <div class="audio-drop" id="drop-zone">
        <input type="file" accept="audio/*" id="f-audio" onchange="handleFile(this)">
        <div class="drop-text">🎵 Glisser-déposer ou cliquer pour choisir</div>
        <div class="drop-hint">MP3, WAV, OGG, M4A, FLAC…</div>
        <div class="file-name" id="file-label"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveInstrument()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- PANNEAU DÉTAIL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="closeDetailDirect()">✕</button>
    <div class="detail-family" id="d-family"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-origin" id="d-origin"></div>
    <div class="detail-section" id="d-audio-wrap"></div>
    <div class="detail-section">
      <div class="detail-label">Description</div>
      <div class="detail-text" id="d-desc"></div>
    </div>
    <div class="detail-section" id="d-tags-wrap"></div>
  </div>
</div>

<script>
  // ── État global ──────────────────────────────────────────────
  let instruments = JSON.parse(localStorage.getItem('encyclo_music') || '[]');
  let editId = null;
  let currentFilter = 'all';
  let audioFiles = {}; // id → { url, name }
  let currentDetailAudio = null;
  let pendingAudioUrl = null;
  let pendingAudioName = null;

  // ── Données de démonstration ─────────────────────────────────
  if (instruments.length === 0) {
    instruments = [
      {
        id: 1, name: 'Violon', family: 'Cordes', origin: 'Italie, XVIe s.',
        tags: ['classique', 'orchestre'],
        desc: "Le violon est l'instrument à cordes frottées le plus aigu de la famille des violons. Sa forme actuelle s'est stabilisée au XVIe siècle en Italie du Nord. Il tient un rôle fondamental dans la musique classique occidentale, mais aussi dans la musique folk, le jazz manouche ou le bluegrass."
      },
      {
        id: 2, name: 'Kora', family: 'Cordes', origin: 'Afrique de l\'Ouest',
        tags: ['mandingue', 'traditionnel', 'griot'],
        desc: "La kora est un instrument à 21 cordes utilisé par les griots d'Afrique de l'Ouest. Elle combine des caractéristiques d'une harpe et d'un luth. Son caisson de résonance est une calebasse coupée en deux et recouverte de peau de vache."
      },
      {
        id: 3, name: 'Didgeridoo', family: 'Vents', origin: 'Australie',
        tags: ['aborigène', 'cérémonie', 'bourdon'],
        desc: "Le didgeridoo est un instrument à vent développé par les peuples indigènes d'Australie. Joué en pratiquant une respiration circulaire, il produit une tonalité bourdonante caractéristique et gutturale. Il est l'un des instruments à vent les plus anciens du monde."
      },
      {
        id: 4, name: 'Theremin', family: 'Électronique', origin: 'Russie, 1919',
        tags: ['expérimental', 'sans contact', 'pionnier'],
        desc: "Inventé par Léon Theremin, c'est l'un des premiers instruments électroniques de l'histoire. Il se joue sans contact physique : deux antennes détectent la position des mains pour contrôler la hauteur et le volume. Son son éthéré est emblématique de la musique de science-fiction des années 50."
      },
      {
        id: 5, name: 'Balafon', family: 'Percussions', origin: 'Afrique subsaharienne',
        tags: ['xylophone', 'traditionnel', 'mandingue'],
        desc: "Le balafon est un instrument à percussion mélodique d'Afrique de l'Ouest, apparenté au xylophone. Ses lames de bois reposent sur une caisse de résonance constituée de calebasses séchées. Il est utilisé lors de cérémonies rituelles et festives au Mali, au Burkina Faso et en Guinée."
      },
    ];
    saveLocal();
  }

  // ── Persistance ───────────────────────────────────────────────
  function saveLocal() {
    localStorage.setItem('encyclo_music', JSON.stringify(instruments));
  }

  // ── Rendu de la grille ────────────────────────────────────────
  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('grid');
    const list = instruments.filter(i => {
      const matchQ = !q ||
        i.name.toLowerCase().includes(q) ||
        (i.desc || '').toLowerCase().includes(q) ||
        (i.tags || []).join(' ').toLowerCase().includes(q) ||
        (i.origin || '').toLowerCase().includes(q);
      const matchF = currentFilter === 'all' || i.family === currentFilter;
      return matchQ && matchF;
    });

    const n = instruments.length;
    document.getElementById('count').textContent = n + ' instrument' + (n > 1 ? 's' : '');

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="big">Aucun instrument trouvé</div><div>Essayez un autre filtre ou ajoutez un nouvel instrument.</div></div>';
      return;
    }

    grid.innerHTML = list.map(i => `
      <div class="card" onclick="openDetail(${i.id})">
        <div class="card-family">${i.family}</div>
        <div class="card-name">${escHtml(i.name)}</div>
        <div class="card-origin">${escHtml(i.origin || '—')}</div>
        <div class="card-desc">${escHtml(i.desc || 'Aucune description.')}</div>
        <div class="card-footer">
          ${audioFiles[i.id]
            ? `<div class="audio-pill">♪ Audio disponible</div>`
            : `<div class="no-audio">Pas d'audio</div>`}
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" title="Modifier" onclick="openEdit(${i.id})">✎</button>
            <button class="icon-btn del" title="Supprimer" onclick="deleteInstrument(${i.id})">✕</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  // ── Filtres ───────────────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Modal ajout ───────────────────────────────────────────────
  function openAdd() {
    editId = null;
    document.getElementById('modal-title').textContent = 'Nouvel instrument';
    ['f-name', 'f-origin', 'f-tags', 'f-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-family').value = 'Cordes';
    document.getElementById('f-audio').value = '';
    document.getElementById('file-label').textContent = '';
    pendingAudioUrl = null;
    pendingAudioName = null;
    document.getElementById('modal').classList.add('open');
  }

  function openEdit(id) {
    const inst = instruments.find(i => i.id === id);
    if (!inst) return;
    editId = id;
    document.getElementById('modal-title').textContent = 'Modifier l\'instrument';
    document.getElementById('f-name').value = inst.name;
    document.getElementById('f-family').value = inst.family;
    document.getElementById('f-origin').value = inst.origin || '';
    document.getElementById('f-tags').value = (inst.tags || []).join(', ');
    document.getElementById('f-desc').value = inst.desc || '';
    document.getElementById('f-audio').value = '';
    pendingAudioUrl = null;
    pendingAudioName = null;
    document.getElementById('file-label').textContent = audioFiles[id] ? '🎵 Audio existant conservé' : '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── Gestion fichier audio ─────────────────────────────────────
  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    pendingAudioUrl = URL.createObjectURL(file);
    pendingAudioName = file.name;
    document.getElementById('file-label').textContent = '🎵 ' + file.name;
  }

  // ── Sauvegarde ────────────────────────────────────────────────
  function saveInstrument() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Le nom de l\'instrument est requis.'); return; }

    const obj = {
      name,
      family: document.getElementById('f-family').value,
      origin: document.getElementById('f-origin').value.trim(),
      tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
      desc: document.getElementById('f-desc').value.trim(),
    };

    if (editId) {
      const idx = instruments.findIndex(i => i.id === editId);
      instruments[idx] = { ...instruments[idx], ...obj };
      if (pendingAudioUrl) audioFiles[editId] = { url: pendingAudioUrl, name: pendingAudioName };
    } else {
      const id = Date.now();
      instruments.push({ id, ...obj });
      if (pendingAudioUrl) audioFiles[id] = { url: pendingAudioUrl, name: pendingAudioName };
    }

    pendingAudioUrl = null;
    pendingAudioName = null;
    saveLocal();
    closeModal();
    render();
  }

  // ── Suppression ───────────────────────────────────────────────
  function deleteInstrument(id) {
    if (!confirm('Supprimer cet instrument définitivement ?')) return;
    instruments = instruments.filter(i => i.id !== id);
    delete audioFiles[id];
    saveLocal();
    if (document.getElementById('detail-overlay').classList.contains('open')) closeDetailDirect();
    render();
  }

  // ── Panneau détail ────────────────────────────────────────────
  function openDetail(id) {
    const inst = instruments.find(i => i.id === id);
    if (!inst) return;

    document.getElementById('d-family').textContent = inst.family;
    document.getElementById('d-name').textContent = inst.name;
    document.getElementById('d-origin').textContent = inst.origin || '';
    document.getElementById('d-desc').textContent = inst.desc || 'Aucune description.';

    // Tags
    const tagsWrap = document.getElementById('d-tags-wrap');
    if (inst.tags && inst.tags.length) {
      tagsWrap.innerHTML = '<div class="detail-label">Tags</div>' +
        inst.tags.map(t => `<span class="badge">${escHtml(t)}</span>`).join('');
    } else {
      tagsWrap.innerHTML = '';
    }

    // Audio
    if (currentDetailAudio) { currentDetailAudio.pause(); currentDetailAudio = null; }
    const audioWrap = document.getElementById('d-audio-wrap');

    if (audioFiles[id]) {
      const af = audioFiles[id];
      audioWrap.innerHTML = `
        <div class="detail-label">Aperçu sonore</div>
        <div class="audio-player">
          <div class="player-track">♪ <span>${escHtml(af.name)}</span></div>
          <div class="player-controls">
            <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <div class="progress-wrap">
              <div class="progress-bar-bg" id="prog-bg" onclick="seekAudio(event)">
                <div class="progress-bar-fill" id="prog-fill"></div>
              </div>
              <div class="time-display" id="time-disp">0:00 / 0:00</div>
            </div>
          </div>
        </div>`;

      currentDetailAudio = new Audio(af.url);
      currentDetailAudio.ontimeupdate = updateProgress;
      currentDetailAudio.onended = () => {
        const btn = document.getElementById('play-btn');
        if (btn) btn.textContent = '▶';
        const fill = document.getElementById('prog-fill');
        if (fill) fill.style.width = '0%';
      };
    } else {
      audioWrap.innerHTML = `
        <div class="detail-label">Aperçu sonore</div>
        <div style="font-size:13px;color:var(--muted);font-style:italic;padding:0.5rem 0;">
          Aucun fichier audio associé à cet instrument.
        </div>`;
    }

    document.getElementById('detail-overlay').classList.add('open');
  }

  function togglePlay() {
    if (!currentDetailAudio) return;
    if (currentDetailAudio.paused) {
      currentDetailAudio.play();
      document.getElementById('play-btn').textContent = '⏸';
    } else {
      currentDetailAudio.pause();
      document.getElementById('play-btn').textContent = '▶';
    }
  }

  function updateProgress() {
    if (!currentDetailAudio) return;
    const pct = (currentDetailAudio.currentTime / currentDetailAudio.duration) * 100 || 0;
    const fill = document.getElementById('prog-fill');
    const disp = document.getElementById('time-disp');
    if (fill) fill.style.width = pct + '%';
    if (disp) disp.textContent = fmtTime(currentDetailAudio.currentTime) + ' / ' + fmtTime(currentDetailAudio.duration);
  }

  function seekAudio(e) {
    if (!currentDetailAudio || !currentDetailAudio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    currentDetailAudio.currentTime = pct * currentDetailAudio.duration;
  }

  function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function closeDetail(e) {
    if (e.target === document.getElementById('detail-overlay')) closeDetailDirect();
  }

  function closeDetailDirect() {
    if (currentDetailAudio) { currentDetailAudio.pause(); currentDetailAudio = null; }
    document.getElementById('detail-overlay').classList.remove('open');
  }

  // ── Fermer modal en cliquant dehors ───────────────────────────
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // ── Drag & drop audio ─────────────────────────────────────────
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('audio/')) {
      pendingAudioUrl = URL.createObjectURL(file);
      pendingAudioName = file.name;
      document.getElementById('file-label').textContent = '🎵 ' + file.name;
    }
  });

  // ── Raccourci clavier Échap ───────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeDetailDirect();
    }
  });

  // ── Init ──────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
